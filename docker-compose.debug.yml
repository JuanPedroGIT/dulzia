# Configuración de DEBUG - Exponer servicios directamente
services:
  backend:
    build:
      context: ./backend
      target: dev
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      APP_SECRET: ${APP_SECRET}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DATABASE_URL: postgresql://dulzia:${DULZIA_DB_PASS}@shared-postgres-db:5432/dulzia?serverVersion=16&charset=utf8
      EMAIL_API_KEY: ${BREVO_API_KEY}
      CORS_ALLOW_ORIGIN: '*'
    networks:
      - shared-network
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - ./backend/public/uploads:/var/www/html/public/uploads
    depends_on:
      - postgres

  # Frontend en modo dev - para debug local
  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5174:5173"
    networks:
      - shared-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # Nginx simplificado - sin SSL, solo proxy
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-debug.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shared-network
    depends_on:
      - backend
      - frontend

  postgres:
    image: alpine:latest
    command: echo "Using shared PostgreSQL from infra"
    networks:
      - shared-network
    deploy:
      replicas: 0

networks:
  shared-network:
    name: shared-network
    external: true
