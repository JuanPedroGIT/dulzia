services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dulzia
      POSTGRES_USER: dulzia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dulzia" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      APP_SECRET: ${APP_SECRET}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DATABASE_URL: postgresql://dulzia:${POSTGRES_PASSWORD}@postgres:5432/dulzia?serverVersion=16&charset=utf8
      EMAIL_API_KEY: ${BREVO_API_KEY}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - ./backend/public/uploads:/var/www/html/public/uploads

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - app-network
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
