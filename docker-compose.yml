services:
  # --- Backend de Dulzia (Symfony/PHP) ---
  dulzia-backend:
    build:
      context: ./backend
      target: dev # O 'prod' según prefieras
    container_name: dulzia-backend
    restart: unless-stopped
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      APP_SECRET: ${APP_SECRET}
      # Importante: DATABASE_URL apunta al contenedor 'shared-postgres-db' de Infra
      DATABASE_URL: postgresql://dulzia:${DULZIA_DB_PASS}@shared-postgres-db:5432/dulzia?serverVersion=16&charset=utf8
      EMAIL_API_KEY: ${BREVO_API_KEY}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    networks:
      - shared-network
    # Quitamos ports: "8000:8000" (Infra llegará aquí internamente)
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - ./backend/public/uploads:/var/www/html/public/uploads
    depends_on:
      - postgres

  # --- Frontend de Dulzia (Vite/Vue) --- 
  dulzia-frontend:
    build:
      context: ./frontend
      target: dev # O 'prod'
    container_name: dulzia-frontend
    restart: unless-stopped
    environment:
      # La URL de la API es ahora tu dominio público con /api
      VITE_API_URL: "https://dulziasalamanca.es/api"
    networks:
      - shared-network
    # Quitamos ports: "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - dulzia-backend

  # Placeholder para no romper dependencias
  postgres:
    image: alpine:latest
    command: echo "Using shared PostgreSQL from infra"
    networks:
      - shared-network
    deploy:
      replicas: 0

networks:
  shared-network:
    name: shared-network
    external: true